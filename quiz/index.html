<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub 퀴즈 — 그립 프로덕트본부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 36px 20px 60px; }

    /* ── Confetti ── */
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 1000; overflow: hidden; }
    .confetti-piece { position: absolute; top: -20px; border-radius: 2px; }

    /* ── Progress bar ── */
    .progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
    .progress-track { height: 8px; background: #1e293b; border-radius: 99px; overflow: hidden; margin-bottom: 32px; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* ── Home ── */
    .home-header { text-align: center; margin-bottom: 40px; }
    .home-icon { font-size: 48px; margin-bottom: 12px; }
    .home-title {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; line-height: 1.3;
    }
    .home-subtitle { color: #94a3b8; font-size: 15px; line-height: 1.6; }

    /* ── Chapter card ── */
    .chapter-card {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px; border: 1px solid #334155;
      border-radius: 16px; background: #1e293b;
      cursor: pointer; text-align: left;
      transition: all 0.2s; width: 100%; margin-bottom: 12px;
    }
    .chapter-card:hover { border-color: #3b82f6; background: rgba(30,58,95,0.13); }
    .chapter-icon { font-size: 32px; flex-shrink: 0; }
    .chapter-info { flex: 1; }
    .chapter-name { font-weight: 700; font-size: 16px; color: #f1f5f9; margin-bottom: 4px; }
    .chapter-count { font-size: 13px; color: #94a3b8; }
    .chapter-badge {
      border-radius: 99px; padding: 4px 14px; font-size: 13px; font-weight: 700; color: #fff;
    }

    /* ── Quiz ── */
    .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .back-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 14px; padding: 8px 0; font-family: inherit; }
    .back-btn:hover { color: #94a3b8; }
    .chapter-label { font-size: 14px; color: #64748b; }

    .question-card {
      background: #1e293b; border-radius: 20px; padding: 32px;
      border: 1px solid #334155; margin-bottom: 20px;
    }
    .q-number { font-size: 13px; color: #3b82f6; font-weight: 700; margin-bottom: 12px; }
    .q-text { font-size: 18px; font-weight: 700; line-height: 1.6; color: #f1f5f9; }

    .option-btn {
      display: block; width: 100%; padding: 16px 20px; border-radius: 14px;
      border: 2px solid #334155; background: #1e293b;
      color: #e2e8f0; cursor: pointer; text-align: left;
      font-size: 15px; font-weight: 500; line-height: 1.5;
      transition: all 0.2s; font-family: inherit; margin-bottom: 10px;
    }
    .option-btn:hover:not(.answered) { border-color: #3b82f6; background: rgba(30,58,95,0.27); }
    .option-btn.correct { background: #059669; border-color: #059669; color: #fff; }
    .option-btn.wrong { background: #dc2626; border-color: #dc2626; color: #fff; }
    .option-btn.dimmed { background: #0f172a; border-color: #1e293b; color: #475569; }
    .option-label { color: #64748b; margin-right: 10px; font-weight: 700; }
    .option-btn.correct .option-label,
    .option-btn.wrong .option-label { color: inherit; }

    /* ── Explanation ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .explanation {
      border-radius: 16px; padding: 20px 24px; margin-bottom: 24px;
      animation: fadeIn 0.3s ease;
    }
    .explanation.correct-bg { background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.27); }
    .explanation.wrong-bg { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.27); }
    .explanation-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
    .explanation-title.correct { color: #34d399; }
    .explanation-title.wrong { color: #fca5a5; }
    .explanation-text { font-size: 15px; line-height: 1.7; color: #cbd5e1; }

    /* ── Buttons ── */
    .next-btn {
      width: 100%; padding: 16px 0; border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff; border: none; cursor: pointer;
      font-size: 16px; font-weight: 700; font-family: inherit;
      transition: transform 0.15s;
    }
    .next-btn:active { transform: scale(0.97); }
    .primary-btn {
      padding: 14px 28px; border-radius: 99px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; font-family: inherit;
    }
    .ghost-btn {
      padding: 14px 28px; border-radius: 99px;
      background: transparent; border: 1px solid #475569;
      color: #94a3b8; cursor: pointer; font-size: 15px; font-weight: 600; font-family: inherit;
    }
    .ghost-btn:hover { border-color: #64748b; color: #cbd5e1; }
    .btn-row { display: flex; gap: 12px; justify-content: center; }

    /* ── Result ── */
    .result-wrap { text-align: center; padding-top: 48px; }
    .result-emoji { font-size: 64px; margin-bottom: 16px; }
    .result-title { font-size: 24px; font-weight: 800; color: #f1f5f9; margin-bottom: 8px; }
    .result-sub { color: #94a3b8; font-size: 15px; margin-bottom: 32px; }
    .score-box {
      display: inline-flex; align-items: baseline; gap: 8px;
      background: #1e293b; border-radius: 20px; padding: 24px 48px; margin-bottom: 32px;
    }
    .score-big { font-size: 48px; font-weight: 900; }
    .score-total { font-size: 20px; color: #64748b; }
    .result-msg { color: #94a3b8; font-size: 15px; margin-bottom: 40px; line-height: 1.6; }

    .final-title {
      font-size: 28px; font-weight: 900; margin-bottom: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── Chapter breakdown ── */
    .breakdown { background: #1e293b; border-radius: 20px; padding: 24px; margin-bottom: 32px; text-align: left; }
    .breakdown-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid #334155;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-icon { font-size: 24px; }
    .breakdown-name { flex: 1; font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .breakdown-bar { width: 80px; height: 6px; background: #0f172a; border-radius: 99px; overflow: hidden; }
    .breakdown-bar-fill { height: 100%; border-radius: 99px; }
    .breakdown-score { font-size: 13px; color: #94a3b8; font-weight: 700; min-width: 36px; text-align: right; }

    .reset-area { text-align: center; margin-top: 32px; }
    .reset-area .ghost-btn { font-size: 14px; padding: 10px 24px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

const QUIZ = [
  { chapter:"Git이 뭔가요?", icon:"🎮", questions:[
    { q:"Git을 게임에 비유하면 어떤 기능과 가장 비슷할까요?", options:["그래픽 설정","세이브 포인트","멀티플레이어","치트키"], answer:1,
      explanation:"Git은 파일의 '세이브 시스템'이에요. 중요한 순간마다 저장(commit)하면, 언제든 그 시점으로 돌아갈 수 있습니다." },
    { q:"Git과 구글 드라이브의 가장 큰 차이점은?", options:["Git은 유료, 드라이브는 무료","Git은 내가 원할 때 직접 저장, 드라이브는 자동 저장","Git은 이미지 전용, 드라이브는 문서 전용","차이가 없다"], answer:1,
      explanation:"구글 드라이브는 자동저장이지만, Git은 '내가 의미 있는 순간에 직접 저장'합니다. 그래서 '이 기능을 추가했을 때' 같은 의미 단위로 기록이 남아요." },
    { q:"GitHub는 뭐하는 곳인가요?", options:["코드를 자동으로 작성해주는 AI 서비스","Git으로 관리하는 파일을 팀과 공유하는 웹사이트","프로그래밍 강의 사이트","컴퓨터 보안 프로그램"], answer:1,
      explanation:"GitHub는 'Git으로 관리하는 파일을 팀과 공유하는 웹사이트'입니다. 구글 드라이브의 코드 버전이라고 생각하면 됩니다!" }
  ]},
  { chapter:"핵심 용어 마스터", icon:"📚", questions:[
    { q:"'Repository(레포지토리)'를 구글 드라이브에 비유하면?", options:["휴지통","공유 드라이브 안의 프로젝트 폴더","검색 기능","계정 설정"], answer:1,
      explanation:"Repository(줄여서 repo)는 하나의 프로젝트에 관련된 모든 파일 + 변경 기록이 담긴 폴더예요." },
    { q:"'Clone(클론)'은 무슨 뜻일까요?", options:["파일을 영구 삭제하기","GitHub에 있는 프로젝트를 내 컴퓨터에 복사해오기","새로운 프로젝트 만들기","다른 사람의 코드를 수정하기"], answer:1,
      explanation:"Clone은 GitHub(인터넷)에 있는 프로젝트 폴더를 내 컴퓨터에 통째로 복사해오는 것입니다." },
    { q:"'Commit(커밋)'을 가장 잘 설명한 것은?", options:["파일을 삭제하는 것","GitHub에 로그인하는 것","'이 상태를 기억해둬!' 하고 세이브 포인트를 만드는 것","다른 사람에게 메시지를 보내는 것"], answer:2,
      explanation:"Commit은 '지금 이 상태를 저장!'이라고 세이브 포인트를 찍는 거예요." },
    { q:"'Push'와 'Pull'의 의미를 올바르게 짝지은 것은?", options:["Push = 다운로드, Pull = 업로드","Push = 삭제, Pull = 복구","Push = 내 커밋을 GitHub에 올리기, Pull = GitHub 최신 내용 가져오기","Push = 프로젝트 만들기, Pull = 프로젝트 삭제"], answer:2,
      explanation:"Push는 내 커밋을 GitHub에 업로드, Pull은 GitHub 최신 내용을 내 컴퓨터로 다운로드하는 것입니다!" },
    { q:"'Branch(브랜치)'는 어떤 상황에 쓰는 건가요?", options:["프로젝트를 완전히 삭제할 때","원본은 그대로 두고 사본에서 실험하고 싶을 때","GitHub 계정을 만들 때","파일 이름을 바꿀 때"], answer:1,
      explanation:"Branch는 구글 문서에서 '사본 만들기' 하는 것과 같아요. 원본(main)은 건드리지 않고 사본에서 실험할 수 있습니다." }
  ]},
  { chapter:"GitHub Desktop 사용법", icon:"🖱️", questions:[
    { q:"GitHub Desktop을 쓰는 가장 큰 이유는?", options:["무료라서","터미널 없이 마우스 클릭만으로 Git을 쓸 수 있어서","게임도 할 수 있어서","자동으로 코드를 작성해줘서"], answer:1,
      explanation:"GitHub Desktop을 쓰면 검은 화면(터미널)에서 명령어를 타이핑할 필요가 없어요!" },
    { q:"GitHub Desktop에서 프로젝트를 내 컴퓨터에 가져오려면?", options:["File → Print","File → Clone Repository","File → Delete","File → New Text File"], answer:1,
      explanation:"File → Clone Repository를 클릭하면 GitHub에 있는 프로젝트를 내 컴퓨터로 복사할 수 있어요." },
    { q:"파일을 수정한 뒤, GitHub Desktop에서 해야 할 순서는?", options:["Push → Commit → Pull","변경사항 확인 → 메시지 적기 → Commit → Push","Delete → Restart → Login","Pull → Clone → Branch"], answer:1,
      explanation:"변경 확인 → 메시지 적기 → Commit 클릭 → Push 버튼으로 GitHub에 올리기!" },
    { q:"팀원이 올린 최신 코드를 내 컴퓨터에 가져오려면?", options:["프로그램을 삭제하고 다시 설치","GitHub Desktop에서 Fetch/Pull origin 버튼 클릭","새 GitHub 계정을 만들기","컴퓨터를 재부팅하기"], answer:1,
      explanation:"GitHub Desktop 상단의 Fetch origin 또는 Pull origin 버튼을 클릭하면 됩니다!" }
  ]},
  { chapter:"실전 상황 대처", icon:"🛠️", questions:[
    { q:"Git 사용 중 에러가 나면 가장 먼저 해볼 것은?", options:["컴퓨터를 포맷한다","GitHub 계정을 삭제한다","에러 메시지를 Claude Code에 붙여넣고 물어본다","아무것도 하지 않고 기다린다"], answer:2,
      explanation:"Claude Code에게 에러 메시지를 그대로 붙여넣으면 대부분 해결됩니다." },
    { q:"실수로 파일을 잘못 수정해서 되돌리고 싶다면?", options:["아무것도 할 수 없다, 끝났다","이전 commit으로 돌아가거나, 최악의 경우 폴더 삭제 후 다시 Clone","GitHub에 항의 메일을 보낸다","새 프로젝트를 처음부터 다시 만든다"], answer:1,
      explanation:"Git은 모든 기록이 남아있어서 언제든 이전 상태로 돌아갈 수 있어요. 폴더 삭제 후 다시 Clone하면 처음 상태로 돌아갑니다." },
    { q:"같은 파일을 두 명이 동시에 수정하면?", options:["파일이 영구적으로 손상된다","먼저 저장한 사람의 것만 남는다","Git이 자동으로 합치려 하고, 안 되면 어떤 걸 쓸지 물어본다","두 사람 다 GitHub에서 차단된다"], answer:2,
      explanation:"Git이 자동으로 합쳐줍니다. 같은 줄을 다르게 수정했으면 둘 중 어떤 버전을 쓸지 선택하면 됩니다!" },
    { q:"우리 팀의 매일 워크플로우를 순서대로 나열한 것은?", options:["Pull → Delete → Restart","만들기(Claude Code) → 저장하기(Commit) → 올리기(Push)","Push → Commit → Clone","Branch → Merge → Delete"], answer:1,
      explanation:"매일 반복하는 3단계: ① Claude Code로 만들기 → ② Commit(저장) → ③ Push(올리기)!" }
  ]}
];

const totalQ = QUIZ.reduce((s,c) => s + c.questions.length, 0);
const COLORS = ["#10b981","#3b82f6","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4"];

function Confetti({ active }) {
  if (!active) return null;
  const ps = Array.from({length:40},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*0.5,dur:1.5+Math.random()*1.5,color:COLORS[i%7],w:6+Math.random()*8,rot:Math.random()*360}));
  return <div className="confetti-wrap">{ps.map(p=><div key={p.id} className="confetti-piece" style={{left:p.left+'%',width:p.w,height:p.w*0.6,backgroundColor:p.color,animation:`confettiFall ${p.dur}s ease-out ${p.delay}s forwards`,transform:`rotate(${p.rot}deg)`}}/>)}</div>;
}

function App() {
  const [screen, setScreen] = useState('home');
  const [ci, setCi] = useState(0);
  const [qi, setQi] = useState(0);
  const [sel, setSel] = useState(null);
  const [shown, setShown] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [answered, setAnswered] = useState(0);
  const [cCorrect, setCCorrect] = useState(0);
  const [scores, setScores] = useState({});
  const [confetti, setConfetti] = useState(false);

  const ch = QUIZ[ci]; const q = ch?.questions[qi];

  function startCh(i) { setCi(i); setQi(0); setSel(null); setShown(false); setCCorrect(0); setScreen('quiz'); }
  function pick(i) {
    if (shown) return; setSel(i); setShown(true); setAnswered(a=>a+1);
    if (i === q.answer) { setCorrect(c=>c+1); setCCorrect(c=>c+1); }
  }
  function next() {
    if (qi < ch.questions.length-1) { setQi(qi+1); setSel(null); setShown(false); }
    else {
      const s = {...scores, [ci]:{c:cCorrect, t:ch.questions.length}};
      setScores(s);
      if (ci < QUIZ.length-1) setScreen('chDone');
      else { setConfetti(true); setScreen('done'); setTimeout(()=>setConfetti(false),4000); }
    }
  }
  function reset() { setCorrect(0); setAnswered(0); setScores({}); setScreen('home'); }

  // HOME
  if (screen==='home') return <div className="wrap">
    <div className="home-header">
      <div className="home-icon">🧠</div>
      <h1 className="home-title">Git & GitHub 퀴즈</h1>
      <p className="home-subtitle">가이드에서 배운 내용을 퀴즈로 확인해보세요!<br/>총 {totalQ}문제, 챕터별로 풀 수 있습니다.</p>
    </div>
    {QUIZ.map((c,i)=>{ const s=scores[i]; return <button key={i} className="chapter-card" onClick={()=>startCh(i)}>
      <div className="chapter-icon">{c.icon}</div>
      <div className="chapter-info"><div className="chapter-name">{i+1}장. {c.chapter}</div><div className="chapter-count">{c.questions.length}문제</div></div>
      {s && <div className="chapter-badge" style={{background:s.c===s.t?'#059669':'#3b82f6'}}>{s.c}/{s.t}</div>}
    </button>})}
    {Object.keys(scores).length>0 && <div className="reset-area">
      <div style={{color:'#94a3b8',fontSize:14,marginBottom:12}}>총 성적: {correct} / {answered} 정답</div>
      <button className="ghost-btn" onClick={reset}>전체 초기화</button>
    </div>}
  </div>;

  // QUIZ
  if (screen==='quiz' && q) return <div className="wrap">
    <div className="quiz-header">
      <button className="back-btn" onClick={()=>setScreen('home')}>← 목록으로</button>
      <div className="chapter-label">{ch.icon} {ci+1}장</div>
    </div>
    <div className="progress-meta"><span>{answered} / {totalQ} 문제</span><span>정답 {correct}개</span></div>
    <div className="progress-track"><div className="progress-fill" style={{width:(answered/totalQ*100)+'%'}}/></div>
    <div className="question-card"><div className="q-number">Q{qi+1}.</div><div className="q-text">{q.q}</div></div>
    <div>{q.options.map((o,i)=>{
      let cls='option-btn'; if(shown){cls+=' answered'; if(i===q.answer)cls+=' correct'; else if(i===sel)cls+=' wrong'; else cls+=' dimmed';}
      return <button key={i} className={cls} onClick={()=>pick(i)}>
        <span className="option-label">{String.fromCharCode(65+i)}.</span>{o}{shown&&i===q.answer?' ✅':''}{shown&&i===sel&&i!==q.answer?' ❌':''}
      </button>
    })}</div>
    {shown && <div className={"explanation "+(sel===q.answer?'correct-bg':'wrong-bg')}>
      <div className={"explanation-title "+(sel===q.answer?'correct':'wrong')}>{sel===q.answer?'🎉 정답!':'💡 아쉽지만 오답!'}</div>
      <div className="explanation-text">{q.explanation}</div>
    </div>}
    {shown && <button className="next-btn" onClick={next}>{qi<ch.questions.length-1?'다음 문제 →':'결과 보기 →'}</button>}
  </div>;

  // CHAPTER DONE
  if (screen==='chDone') { const s=scores[ci]; const pf=s&&s.c===s.t; return <div className="wrap result-wrap">
    <div className="result-emoji">{pf?'🎊':'👏'}</div>
    <h2 className="result-title">{ch.icon} {ci+1}장 완료!</h2>
    <p className="result-sub">{ch.chapter}</p>
    <div className="score-box"><span className="score-big" style={{color:pf?'#10b981':'#3b82f6'}}>{s?.c}</span><span className="score-total">/ {s?.t}</span></div>
    <p className="result-msg">{pf?'완벽합니다! 🎉':s?.c>=s?.t/2?'잘 하고 있어요! 👍':'다시 한번 가이드를 읽어보면 도움이 될 거예요 💪'}</p>
    <div className="btn-row"><button className="ghost-btn" onClick={()=>setScreen('home')}>목록으로</button><button className="primary-btn" onClick={()=>startCh(ci+1)}>다음 챕터 →</button></div>
  </div>}

  // ALL DONE
  if (screen==='done') { const pf=correct===totalQ; const gr=correct>=totalQ*0.8; return <div className="wrap result-wrap">
    <Confetti active={confetti}/>
    <div style={{fontSize:72,marginBottom:16}}>{pf?'🏆':gr?'🎉':'💪'}</div>
    <h2 className="final-title">전체 퀴즈 완료!</h2>
    <p className="result-sub">{pf?'모든 문제를 맞히셨습니다! Git 마스터! 🎓':gr?'훌륭해요! 거의 다 이해하셨네요!':'좋은 시작이에요! 가이드를 한번 더 읽어보면 완벽해질 거예요.'}</p>
    <div className="breakdown">{QUIZ.map((c,i)=>{const s=scores[i]; if(!s)return null; const pct=Math.round(s.c/s.t*100);
      return <div key={i} className="breakdown-row"><span className="breakdown-icon">{c.icon}</span><span className="breakdown-name">{c.chapter}</span>
        <div className="breakdown-bar"><div className="breakdown-bar-fill" style={{width:pct+'%',background:pct===100?'#10b981':pct>=60?'#3b82f6':'#f59e0b'}}/></div>
        <span className="breakdown-score">{s.c}/{s.t}</span></div>})}</div>
    <div className="score-box"><span style={{fontSize:14,color:'#64748b'}}>최종 점수</span><span className="score-big" style={{color:pf?'#10b981':gr?'#3b82f6':'#f59e0b',marginLeft:12}}>{correct}</span><span className="score-total">/ {totalQ}</span></div>
    <div className="btn-row"><button className="ghost-btn" onClick={reset}>처음부터 다시</button><button className="primary-btn" onClick={()=>setScreen('home')}>챕터 선택</button></div>
  </div>}

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
